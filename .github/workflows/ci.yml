name: ci

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/signstream

  unit:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      # Coverage gates (>=75% overall, >=90% on schema/metrics/stats) are
      # enforced once the first metric code lands.
      - run: pytest tests/unit -m "not slow" --cov=signstream --cov-report=term-missing

  # A third job — the end-to-end smoke run on the tinyset fixture with a
  # determinism check — is added in a later increment, once the runner and
  # simulator exist.
