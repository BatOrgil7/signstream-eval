# Rule: schema v1.0 defines exactly two line types; new types require a
# schema MINOR bump.
#   line 2: type "revision" (agents must not self-report revisions — ADR-5,
#           and no such line type exists)      -> unknown-event-type
#   line 3: no "type" field at all             -> missing-required-field
description: An unknown line type and a line missing its type discriminator.
expect:
  valid: false
  error_codes: [unknown-event-type, missing-required-field]
  warning_codes: []
run_meta:
  schema_version: "1.0"
  run_id: "E1/chunked-k4-s42"
  created_utc: "2026-08-14T09:31:07Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "e1_pareto"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: chunked, chunk_frames: 4, lookahead_frames: 4 }
  seed: 42
  hardware: { gpu: "NVIDIA RTX 4090 24GB" }
  wallclock_protocol: { batch_size: 1, warmup_utts: 10, timer: perf_counter }
events:
  - { type: utt_start, utt_id: u1, n_frames: 10 }
