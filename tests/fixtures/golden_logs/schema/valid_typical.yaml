# pattern), one final emission per utterance as the last event. Field
# values mirror the run_meta/emissions examples in the design spec.
# Hand-check: every required field present; t_frame non-decreasing per
# utterance; exactly one is_final=true per utterance, last; t_frame within
# 0..n_frames-1. => valid, no issues.
description: Typical streaming run over two utterances with revisions.
expect:
  valid: true
  error_codes: []
  warning_codes: []
