# Rule: emissions.jsonl is one JSON OBJECT per line.
#   line 2: not JSON at all      -> invalid-json
#   line 3: JSON, but a scalar   -> invalid-line
# raw_emissions bypasses the fixture's structured events so the broken
# bytes reach the parser verbatim.
description: A non-JSON line and a JSON-scalar line in emissions.jsonl.
expect:
  valid: false
  error_codes: [invalid-json, invalid-line]
  warning_codes: []
run_meta:
  schema_version: "1.0"
  run_id: "E1/chunked-k4-s42"
  created_utc: "2026-08-14T09:31:07Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "e1_pareto"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: chunked, chunk_frames: 4, lookahead_frames: 4 }
  seed: 42
  hardware: { gpu: "NVIDIA RTX 4090 24GB" }
  wallclock_protocol: { batch_size: 1, warmup_utts: 10, timer: perf_counter }
raw_emissions:
  - '{"type":"utt_start","utt_id":"u1","n_frames":10}'
  - 'this is not json'
  - '42'
  - '{"type":"emission","utt_id":"u1","t_frame":9,"t_wall_ms":1.0,"hyp":["A"],"is_final":true}'
