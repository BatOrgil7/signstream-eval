# The bidirectional offline topline (k = infinity): one step observing all
# frames, so each utterance logs exactly one emission — the final one — at
# t_frame = n_frames - 1. mask.chunk_frames and mask.lookahead_frames are
# null: neither is meaningful without streaming.
# => valid, no issues.
description: Bidirectional offline topline with null mask geometry.
expect:
  valid: true
  error_codes: []
  warning_codes: []
run_meta:
  schema_version: "1.0"
  run_id: "E1/bidirectional-kinf-s42"
  created_utc: "2026-08-16T08:00:00Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "e1_pareto"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: bidirectional, chunk_frames: null, lookahead_frames: null }
  seed: 42
  hardware:
    gpu: "NVIDIA RTX 4090 24GB"
    driver: "555.xx"
    torch: "2.4.1+cu124"
    deterministic: true
  wallclock_protocol: { batch_size: 1, warmup_utts: 10, timer: perf_counter }
events:
  - { type: utt_start, utt_id: u1, n_frames: 176 }
  - { type: emission, utt_id: u1, t_frame: 175, t_wall_ms: 45.3, hyp: ["__ON__", "MORGEN", "NORD", "REGEN"], is_final: true }
  - { type: utt_start, utt_id: u2, n_frames: 120 }
  - { type: emission, utt_id: u2, t_frame: 119, t_wall_ms: 31.0, hyp: ["WETTER", "HEUTE", "NACHT"], is_final: true }
