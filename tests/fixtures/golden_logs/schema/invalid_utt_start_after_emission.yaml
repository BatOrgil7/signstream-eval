# Rule: utt_start must precede the utterance's emissions. Here the order is
# inverted: the emission arrives first (=> emission-before-utt-start at that
# line), then the late utt_start (=> utt-start-after-emission).
description: utt_start arriving after the utterance already emitted.
expect:
  valid: false
  error_codes: [emission-before-utt-start, utt-start-after-emission]
  warning_codes: []
run_meta:
  schema_version: "1.0"
  run_id: "E1/chunked-k4-s42"
  created_utc: "2026-08-14T09:31:07Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "e1_pareto"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: chunked, chunk_frames: 4, lookahead_frames: 4 }
  seed: 42
  hardware: { gpu: "NVIDIA RTX 4090 24GB" }
  wallclock_protocol: { batch_size: 1, warmup_utts: 10, timer: perf_counter }
