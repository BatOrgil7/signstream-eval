# Rule: exactly one is_final=true emission per utterance. u1 finalizes
# twice => multiple-final-emissions at the second final.
description: Two final emissions for the same utterance.
expect:
  valid: false
  error_codes: [multiple-final-emissions]
  warning_codes: []
run_meta:
  schema_version: "1.0"
  run_id: "E1/chunked-k4-s42"
  created_utc: "2026-08-14T09:31:07Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "e1_pareto"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: chunked, chunk_frames: 4, lookahead_frames: 4 }
  seed: 42
  hardware: { gpu: "NVIDIA RTX 4090 24GB" }
  wallclock_protocol: { batch_size: 1, warmup_utts: 10, timer: perf_counter }
events:
  - { type: utt_start, utt_id: u1, n_frames: 30 }
  - { type: emission, utt_id: u1, t_frame: 10, t_wall_ms: 1.2, hyp: ["A"], is_final: true }
  - { type: emission, utt_id: u1, t_frame: 20, t_wall_ms: 1.0, hyp: ["A", "B"], is_final: true }
