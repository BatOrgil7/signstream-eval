# quality/wer golden — typical case (gloss unit).
# Hand computation, WER(u) = (S+D+I)/N vs the FINAL hypothesis:
#   u1: ref [MORGEN, REGEN, NORD], final [MORGEN, WIND, NORD]
#       -> S=1, D=0, I=0, N=3 -> 1/3 = 0.3333333333333333
#   u2: ref [HEUTE, ABEND],       final [HEUTE, ABEND]
#       -> 0 edits, N=2         -> 0.0
#   u3: ref [WETTER],             final [WETTER, KALT]
#       -> I=1, N=1              -> 1.0
# Corpus aggregate (standard convention, sum of edits / sum of N):
#   (1+0+1) / (3+2+1) = 2/6 = 0.3333333333333333 ; coverage 3/3 = 1.0
# The same log scored with quality/cer is undefined everywhere: the run's
# unit is gloss, and cer is defined only on character-unit runs (ADR-7).
# Partial (non-final) emissions are present to prove only finals count.
description: WER over three gloss utterances with one sub, one exact, one insertion.
run_meta:
  schema_version: "1.0"
  run_id: "golden/wer-typical"
  created_utc: "2026-08-14T09:31:07Z"
  git_sha: "a1b2c3d"
  config_hash: "9f2e77c1"
  experiment: "golden"
  dataset: { name: phoenix14t, split: test, fps: 25.0, unit: gloss }
  model:
    name: transformer_ctc
    params: 9200000
    mask: { mode: chunked, chunk_frames: 4, lookahead_frames: 4 }
  seed: 42
  hardware: { gpu: "synthetic" }
  wallclock_protocol: { batch_size: 1, warmup_utts: 0, timer: perf_counter }
events:
  - { type: utt_start, utt_id: u1, n_frames: 60 }
  - { type: emission, utt_id: u1, t_frame: 20, t_wall_ms: 1.0, hyp: [MORGEN], is_final: false }
  - { type: emission, utt_id: u1, t_frame: 59, t_wall_ms: 1.0, hyp: [MORGEN, WIND, NORD], is_final: true }
  - { type: utt_start, utt_id: u2, n_frames: 40 }
  - { type: emission, utt_id: u2, t_frame: 39, t_wall_ms: 1.0, hyp: [HEUTE, ABEND], is_final: true }
  - { type: utt_start, utt_id: u3, n_frames: 30 }
  - { type: emission, utt_id: u3, t_frame: 10, t_wall_ms: 1.0, hyp: [], is_final: false }
  - { type: emission, utt_id: u3, t_frame: 29, t_wall_ms: 1.0, hyp: [WETTER, KALT], is_final: true }
reference:
  unit: gloss
  utterances:
    u1: [MORGEN, REGEN, NORD]
    u2: [HEUTE, ABEND]
    u3: [WETTER]
expect:
  metrics:
    quality/wer:
      per_utt: { u1: 0.3333333333333333, u2: 0.0, u3: 1.0 }
      aggregate: { wer: 0.3333333333333333, coverage: 1.0 }
    quality/cer:
      per_utt: { u1: null, u2: null, u3: null }
      aggregate: { coverage: 0.0 }
